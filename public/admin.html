<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Admin Dashboard</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-blue-50 p-6">

  

  
  <div class="flex justify-between items-center mb-6">
    <h1 class="text-2xl font-bold">
      Admin Dashboard
    </h1>
  
    <button
      onclick="logout()"
      class="bg-red-500 text-white px-4 py-2 rounded"
    >
      Logout
    </button>
  </div>

  
  <div class="mb-6">
    <input
      id="searchInput"
      type="text"
      placeholder="Search feedback..."
      class="w-full border p-2 rounded"
    />
  </div>

  <div
    id="totalCount"
    class="mb-4 text-gray-600"
    >
   </div>

   <div
     id="loading"
     class="hidden flex justify-center my-4"
     >
     <div
     class="animate-spin rounded-full h-10 w-10 border-b-4 border-blue-500"
     ></div>
   </div>

  <div id="list" class="space-y-4"></div>

  <div class="flex justify-center gap-4 mt-6">

    <button
    id="prevBtn"
    class="bg-blue-500 text-white px-4 py-2 rounded disabled:bg-gray-400"
      >
      Prev
    </button>
  
    <button
    id="nextBtn"
    class="bg-blue-500 text-white px-4 py-2 rounded disabled:bg-gray-400"
     >
      Next
    </button>
  
  </div>



  <div class="mb-6">
    <select
      id="statusFilter"
      class="border p-2 rounded"
    >
      <option value="">All Status</option>
      <option value="SUBMITTED">SUBMITTED</option>
      <option value="IN_REVIEW">IN_REVIEW</option>
      <option value="RESOLVED">RESOLVED</option>
    </select>
  </div>

  <script src="./js/admin.js"></script>
</body>
</html>
