<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Login</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-blue-50 flex items-center justify-center h-screen">

  <div class="bg-white shadow-lg rounded-xl p-8 w-80">

    <h1 class="text-2xl font-bold text-center text-blue-600 mb-6">
      Admin Login
    </h1>

    <input
      id="username"
      type="text"
      placeholder="Username"
      class="w-full mb-3 p-2 border rounded focus:outline-none focus:ring-2 focus:ring-blue-400"
    />

    <input
      id="password"
      type="password"
      placeholder="Password"
      class="w-full mb-4 p-2 border rounded focus:outline-none focus:ring-2 focus:ring-blue-400"
    />

    <button
      onclick="login()"
      class="w-full bg-blue-500 hover:bg-blue-600 text-white py-2 rounded transition"
    >
      Login
    </button>

    <p id="error" class="text-red-500 text-sm mt-3 text-center"></p>

  </div>

  <script src="./js/login.js"></script>
</body>
</html>
